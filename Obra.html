<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Obra - Fada Malu</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#121212;
    color:white;
    font-family:'Montserrat',sans-serif;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    background:#1a1a1a;
    position:sticky;
    top:0;
    border-bottom:1px solid #222;
}

.logo{
    color:#a64dff;
    font-weight:bold;
}

/* CONTAINER */
.container{
    max-width:1000px;
    margin:auto;
    padding:15px;
}

/* INFO OBRA */
.info{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.cover{
    width:200px;
    border-radius:10px;
}

.title{
    font-size:22px;
    font-weight:bold;
}

.desc{
    color:#aaa;
    font-size:14px;
    margin-top:10px;
}

/* TAGS */
.tags span{
    background:#1c1c1c;
    padding:4px 8px;
    border-radius:6px;
    margin-right:5px;
    font-size:12px;
    color:#a64dff;
}

/* BOTÕES */
.actions{
    margin-top:10px;
    display:flex;
    gap:10px;
}

button{
    background:#1c1c1c;
    color:white;
    border:1px solid #333;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    border-color:#a64dff;
}

/* CAPÍTULOS */
.chapters{
    margin-top:30px;
}

.chapter{
    background:#1c1c1c;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
    cursor:pointer;
}

.chapter:hover{
    border:1px solid #a64dff;
}

/* BUSCA */
.search{
    margin-top:20px;
}

.search input{
    width:100%;
    padding:10px;
    background:#1c1c1c;
    border:none;
    color:white;
    border-radius:8px;
    outline:none;
}

/* CONTINUAR LEITURA */
.continue{
    background:#a64dff;
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
    margin-top:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">Fada Malu</div>
    <div>Obra</div>
</div>

<div class="container">

<!-- INFO -->
<div class="info">

<img id="cover" class="cover">

<div>

<div class="title" id="title">Carregando...</div>

<div class="tags">
<span>Drama</span>
<span>Fantasia</span>
<span>Romance</span>
</div>

<div class="desc" id="desc">
Sinopse carregando...
</div>

<button class="continue" onclick="continuar()">▶ Continuar leitura</button>

<div class="actions">
<button onclick="favoritar()">★ Favoritar</button>
<button onclick="compartilhar()">⤴ Compartilhar</button>
</div>

</div>

</div>

<!-- BUSCA -->
<div class="search">
<input id="busca" placeholder="Buscar capítulo...">
</div>

<!-- CAPÍTULOS -->
<div class="chapters" id="chapters"></div>

</div>

<script>
let p = new URLSearchParams(location.search);
let obraId = p.get("obra");

/* DADOS MOCK (depois Firebase) */
let obra = {
    nome:"Vampiros das Sombras",
    desc:"Um mundo onde humanos e vampiros vivem em guerra constante...",
    capa:"img/capas/obra3.jpg",
    caps:20
};

/* CARREGAR */
document.getElementById("title").innerText = obra.nome;
document.getElementById("desc").innerText = obra.desc;
document.getElementById("cover").src = obra.capa;

/* FAVORITO */
function favoritar(){
let fav=JSON.parse(localStorage.getItem("fav"))||[];
if(!fav.includes(obraId))fav.push(obraId);
else fav=fav.filter(f=>f!=obraId);
localStorage.setItem("fav",JSON.stringify(fav));
alert("Salvo nos favoritos");
}

/* CONTINUAR */
function continuar(){
location=`leitor.html?obra=${obraId}&cap=1`;
}

/* CAPÍTULOS */
let chapters=document.getElementById("chapters");

function renderCaps(){

chapters.innerHTML="";

for(let i=obra.caps;i>=1;i--){

let div=document.createElement("div");
div.className="chapter";

div.innerHTML=`
<span>Capítulo ${i}</span>
<span>→</span>
`;

div.onclick=()=>location=`leitor.html?obra=${obraId}&cap=${i}`;

chapters.appendChild(div);
}

}
renderCaps();

/* BUSCA */
document.getElementById("busca").oninput=(e)=>{
let val=e.target.value.toLowerCase();
let items=document.querySelectorAll(".chapter");

items.forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(val)?"flex":"none";
});
};

/* COMPARTILHAR */
function compartilhar(){
navigator.clipboard.writeText(location.href);
alert("Link copiado!");
}
</script>

</body>
  </html>
