<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fada Malu</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#121212;
    color:white;
    font-family:'Montserrat',sans-serif;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    background:#1a1a1a;
    position:sticky;
    top:0;
}

.logo{color:#a64dff;font-weight:bold}

.search-box{
    position:relative;
}

.search-box input{
    padding:8px;
    border:none;
    border-radius:8px;
    background:#222;
    color:white;
}

.sugestoes{
    position:absolute;
    background:#1e1e1e;
    width:200px;
    top:35px;
    border-radius:8px;
    display:none;
}

.sugestoes div{
    padding:8px;
    cursor:pointer;
}

.sugestoes div:hover{
    background:#333;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:15px;
    padding:15px;
}

.card{
    background:#1c1c1c;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card p{
    padding:8px;
}

.fav{
    color:gold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">Fada Malu</div>

    <div class="search-box">
        <input type="text" id="busca" placeholder="Buscar...">
        <div class="sugestoes" id="sugestoes"></div>
    </div>

    <button onclick="login()" id="btnLogin">Entrar</button>
    <span id="user"></span>
</div>

<h3 style="padding-left:15px">📚 Obras</h3>
<div class="grid" id="lista"></div>

<h3 style="padding-left:15px">❤️ Favoritos</h3>
<div class="grid" id="favoritos"></div>

<script>
let obras=[
    {id:1,nome:"Obra 1",capa:"img/capas/obra1.jpg"},
    {id:2,nome:"Obra 2",capa:"img/capas/obra2.jpg"},
    {id:3,nome:"Vampiros",capa:"img/capas/obra3.jpg"}
];

let lista=document.getElementById("lista");
let favDiv=document.getElementById("favoritos");

let favoritos=JSON.parse(localStorage.getItem("fav"))||[];

function render(){
    lista.innerHTML="";
    obras.forEach(o=>{
        let div=document.createElement("div");
        div.className="card";

        div.innerHTML=`
            <img src="${o.capa}">
            <p>${o.nome}</p>
            <p class="fav" onclick="favoritar(${o.id}, event)">❤️</p>
        `;

        div.onclick=()=>location="obra.html?obra="+o.id;

        lista.appendChild(div);
    });
}

function favoritar(id,e){
    e.stopPropagation();

    if(!favoritos.includes(id)){
        favoritos.push(id);
    }else{
        favoritos=favoritos.filter(f=>f!=id);
    }

    localStorage.setItem("fav",JSON.stringify(favoritos));
    renderFav();
}

function renderFav(){
    favDiv.innerHTML="";
    obras.filter(o=>favoritos.includes(o.id)).forEach(o=>{
        let div=document.createElement("div");
        div.className="card";

        div.innerHTML=`<img src="${o.capa}"><p>${o.nome}</p>`;
        div.onclick=()=>location="obra.html?obra="+o.id;

        favDiv.appendChild(div);
    });
}

let busca=document.getElementById("busca");
let sug=document.getElementById("sugestoes");

busca.oninput=()=>{
    let val=busca.value.toLowerCase();
    sug.innerHTML="";

    if(!val){
        sug.style.display="none";
        return;
    }

    let filtrados=obras.filter(o=>o.nome.toLowerCase().includes(val));

    filtrados.forEach(o=>{
        let div=document.createElement("div");
        div.innerText=o.nome;
        div.onclick=()=>location="obra.html?obra="+o.id;
        sug.appendChild(div);
    });

    sug.style.display="block";
};

render();
renderFav();
</script>

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

function login(){
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider);
}

auth.onAuthStateChanged(user=>{
    if(user){
        document.getElementById("btnLogin").style.display="none";
        document.getElementById("user").innerText=user.displayName;
        console.log("Logado:", user.email);
    }
});
</script>

</body>
  </html>
